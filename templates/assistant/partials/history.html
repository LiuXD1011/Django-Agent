{% load assistant_format %}
{% for item in chat_messages %}
  <div class="chat-message chat-message-{{ item.role }}">
    <div class="chat-avatar">{% if item.role == "user" %}我{% else %}AI{% endif %}</div>
    <div class="chat-message-body">
      <div class="chat-message-name">{% if item.role == "user" %}我{% else %}AI助手{% endif %}</div>
      <div class="chat-message-content">
        <div class="chat-markdown">{{ item.content|assistant_markdown }}</div>
      </div>
    </div>
  </div>
{% empty %}
  <div class="assistant-empty">
    <h1>今天想整理什么？</h1>
    <p>把问题放在这里，我们慢慢拆清楚。</p>
  </div>
{% endfor %}
