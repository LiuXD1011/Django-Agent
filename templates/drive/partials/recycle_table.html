<div class="table-wrap">
  <table>
    <thead><tr><th>名称</th><th>删除时间</th><th>操作</th></tr></thead>
    <tbody>
      {% for item in files %}
        <tr>
          <td>{{ item.name }}</td>
          <td>{{ item.deleted_at|date:"Y-m-d H:i" }}</td>
          <td class="ops">
            <form method="post" action="{% url 'recycle:restore' item.id %}">{% csrf_token %}<button class="button button-small" type="submit">还原</button></form>
            <form method="post" action="{% url 'recycle:purge' item.id %}">{% csrf_token %}<button class="button button-small danger" type="submit">彻底删除</button></form>
          </td>
        </tr>
      {% empty %}
        <tr><td colspan="3">回收站为空</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
