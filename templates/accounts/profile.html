{% extends "base.html" %}
{% block title %}个人资料{% endblock %}
{% block content %}
<section class="panel narrow profile-panel">
  <div class="section-heading">
    <div>
      <h1>用户信息</h1>
      <p class="muted">维护你的昵称、手机号和头像。</p>
    </div>
  </div>

  <div class="profile-avatar-preview">
    <span class="user-avatar profile-avatar {% if request.user.avatar %}has-image{% endif %}">
      {% if request.user.avatar %}
        <img src="{{ request.user.avatar.url }}" alt="{{ request.user.username }} 的头像">
      {% endif %}
      <span class="avatar-fallback">{{ request.user.username|slice:":1"|upper }}</span>
    </span>
    <div>
      <strong>{{ request.user.username }}</strong>
      <p class="muted">头像保存在本地 media 目录中。</p>
    </div>
  </div>

  <form method="post" enctype="multipart/form-data" class="form profile-form">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <label class="field">
      <span>用户名</span>
      {{ form.username }}
      {{ form.username.errors }}
    </label>
    <label class="field">
      <span>手机号</span>
      {{ form.phone }}
      {{ form.phone.errors }}
    </label>
    <label class="field">
      <span>头像</span>
      {{ form.avatar }}
      {{ form.avatar.errors }}
    </label>
    <button class="button" type="submit">保存</button>
  </form>
</section>
{% endblock %}
